name: Documentation

on:
  push:
    branches: [ "main" ]
    paths:
      - 'pcdigitizer/**'
      - 'docs/**'
      - 'pixi.toml'
      - 'pixi.lock'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'pcdigitizer/**'
      - 'docs/**'
      - 'pixi.toml'
      - 'pixi.lock'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    name: docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.9.4
        with:
          environments: docs
          locked: false
          frozen: false
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          activate-environment: true

      - name: Build documentation
        run: pixi run docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: 'public/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
